<!DOCTYPE html>
<html lang="en" class="loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:;" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <title>MDPreview</title>
  <script>
    (function() {
      const saved = localStorage.getItem('md-theme');
      let theme = 'solarized-light';
      if (saved === 'light') theme = 'folio';
      else if (saved === 'dark') theme = 'ember';
      else if (saved) theme = saved;
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    html.loading body { visibility: hidden; }
  </style>
</head>
<body>
  <div id="app">

    <div id="toolbar">
      <button class="tb-btn logo-btn" id="btn-sidebar" title="Toggle file panel">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <span class="toolbar-logo">MD<span>P</span>review</span>
      <div class="toolbar-divider"></div>

      <button class="tb-btn" title="Bold (Ctrl+B)" id="tb-bold"><svg viewBox="0 0 24 24"><path d="M6 12h8a4 4 0 0 0 0-8H6v8z"/><path d="M6 12h9a4 4 0 0 1 0 8H6v-8z"/></svg></button>
      <button class="tb-btn" title="Italic (Ctrl+I)" id="tb-italic"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
      <button class="tb-btn" title="Strikethrough" id="tb-strike"><svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
      <button class="tb-btn" title="Inline code" id="tb-code"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
      <button class="tb-btn" title="Code block" id="tb-codeblock">
        <svg viewBox="0 0 14 10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="stroke-width: 1.4">
          <rect x="0" y="0" width="14" height="10" rx="1.5"/>
          <polyline points="1.5,3.2 3,5 1.5,6.8"/>
          <line x1="4.5" y1="3.2" x2="12" y2="3.2"/>
          <line x1="4.5" y1="5"   x2="10" y2="5"   opacity="0.7"/>
          <line x1="4.5" y1="6.8" x2="11" y2="6.8" opacity="0.55"/>
        </svg>
      </button>

      <div class="toolbar-divider"></div>

      <button class="tb-btn wide" title="Heading 1" id="tb-h1">H1</button>
      <button class="tb-btn wide" title="Heading 2" id="tb-h2">H2</button>
      <button class="tb-btn wide" title="Heading 3" id="tb-h3">H3</button>

      <div class="toolbar-divider"></div>

      <button class="tb-btn" title="Unordered list" id="tb-ul"><svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      <button class="tb-btn" title="Ordered list" id="tb-ol"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
      <button class="tb-btn" title="Blockquote" id="tb-quote"><svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
      <button class="tb-btn" title="Link" id="tb-link"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>

      <div id="toolbar-right">
        <button class="tb-btn wide mobile-only" id="btn-preview-toggle" title="Toggle preview">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="tb-btn wide" id="btn-focus" title="Focus mode">
          <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
          Focus
        </button>
        <select id="sel-theme" class="tb-select" title="Theme">
          <option value="solarized-light">Solarized Light</option>
          <option value="solarized-dark">Solarized Dark</option>
          <option value="folio">Folio</option>
          <option value="ember">Ember</option>
          <option value="monokai">Monokai</option>
          <option value="nord">Nord</option>
          <option value="one-dark">One Dark</option>
          <option value="github-light">GitHub Light</option>
        </select>
      </div>
    </div>

    <div id="main">
      <div id="sidebar">
        <div id="sidebar-header">
          <span class="sidebar-title">Files</span>
          <button class="tb-btn" id="btn-new" title="New document">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="doc-list"></div>
      </div>

      <div id="editor-pane">
        <div class="pane-header">editor
          <div class="pane-actions">
            <button class="tb-btn" title="Copy Markdown" id="btn-copy-md"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="tb-btn" title="Download .md" id="btn-download-md"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          </div>
        </div>
        <div id="editor-mount"></div>
      </div>

      <div id="splitter"></div>

      <div id="preview-pane">
        <div class="pane-header">preview
          <div class="pane-actions">
            <button class="tb-btn" title="Copy HTML" id="btn-copy-html"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="tb-btn" title="Download .html" id="btn-download-html"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          </div>
        </div>
        <div id="preview">
          <div class="preview-empty" id="preview-empty">Start writing to see a preview</div>
          <div class="preview-content" id="preview-content"></div>
        </div>
      </div>
    </div>

    <div id="status">
      <span><span class="dot"></span><span id="stat-words">0 words</span></span>
      <span id="stat-chars">0 chars</span>
      <span id="stat-lines">0 lines</span>
      <span id="stat-saved" style="margin-left:auto;">saved</span>
    </div>

  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
